name: MyST GitHub Pages Deploy
on:
  push:
    branches: [main]
env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MyST
        run: npm install -g mystmd

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Generate slide QMD files
        run: |
          find . -name "*.md" -not -path "./_build/*" -not -name "index.md" -not -name "*-index.md" -not -path "./.github/*" | while read f; do
            python md_to_slides.py "$f"
          done

      - name: Render Quarto slides
        run: |
          find . -name "*-slides.qmd" | while read f; do
            quarto render "$f" --to revealjs
          done

      - name: Build MyST site
        run: myst build --html

      - name: Copy slides into MyST build
        run: |
          mkdir -p _build/html/slides
          find . -name "*-slides.html" -not -path "./_build/*" -exec cp {} _build/html/slides/ \;
          echo "Slides copied:"
          ls _build/html/slides/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



     




