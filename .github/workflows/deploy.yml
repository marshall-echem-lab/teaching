08:51
Looking at your find command, you're excluding:

./_build/*
index.md (exact filename)
*-index.md
./.github/*
But README.md doesn't match any of those patterns — it's not named index.md or *-index.md, so it gets picked up.

The fix is to add -not -name "README.md" to the find command, or more robustly, -not -iname "readme.md" if you want case-insensitive matching:

bash
find . -name "*.md" \
  -not -path "./_build/*" \
  -not -name "index.md" \
  -not -name "*-index.md" \
  -not -name "README.md" \
  -not -path "./.github/*"
Or if you want a more general rule that excludes any uppercase/all-caps filenames (less common but possible):

bash
  -not -iname "readme.md" \
